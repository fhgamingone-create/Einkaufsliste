<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />

  <title>Einkaufsliste App</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="phone-app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Supermarkt</p>
        <h1>Einkaufsliste</h1>
      </div>

      <button id="clearDoneButton" class="small-action" type="button">
        Erledigte löschen
      </button>
    </header>

    <section class="stats-card">
      <div>
        <strong id="openCount">0</strong>
        <span>offen</span>
      </div>

      <div>
        <strong id="totalCount">0</strong>
        <span>gesamt</span>
      </div>

      <div>
        <strong id="doneCount">0</strong>
        <span>erledigt</span>
      </div>
    </section>

    <section class="add-card">
      <form id="itemForm">
        <label for="itemName">Artikel hinzufügen</label>

        <div class="add-row">
          <input
            id="itemName"
            type="text"
            placeholder="z. B. Milch"
            autocomplete="off"
            required
          />

          <button class="add-button" type="submit" aria-label="Hinzufügen">
            +
          </button>
        </div>

        <div class="gang-header">
          <span>Gang auswählen</span>
          <strong id="selectedGangLabel">Gang 1</strong>
        </div>

        <div id="gangPicker" class="gang-picker" aria-label="Gang auswählen"></div>
      </form>
    </section>

    <section class="sort-card">
      <button class="sort-button active" type="button" data-sort="gang">
        Nach Gang
      </button>

      <button class="sort-button" type="button" data-sort="alphabetical">
        A–Z
      </button>
    </section>

    <section id="shoppingList" class="shopping-list"></section>

    <section class="utility-card">
      <button id="exportButton" type="button">Liste exportieren</button>

      <label for="importFile">
        Liste importieren
        <input id="importFile" type="file" accept="application/json,.json" />
      </label>
    </section>
  </main>

  <template id="itemTemplate">
    <article class="item">
      <button class="check-button" type="button" aria-label="Erledigt markieren">
        ✓
      </button>

      <div class="item-main">
        <strong class="item-name"></strong>
        <span class="item-meta"></span>
      </div>

      <div class="item-actions">
        <button class="edit-button" type="button" aria-label="Bearbeiten">✎</button>
        <button class="delete-button" type="button" aria-label="Löschen">×</button>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
